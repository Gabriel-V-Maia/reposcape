<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reposcape{% if username %} — @{{ username }}{% else %} — Seed {{ seed }}{% endif %}</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="city-page">

<header class="city-header">
  <a href="/" class="logo-link">🏙️ Reposcape</a>
  <div class="header-info">
    {% if username %}
      <span class="header-username">@{{ username }}</span>
    {% else %}
      <span class="header-username">Seed #{{ seed }}</span>
    {% endif %}
    <span class="header-sub" id="header-sub">carregando...</span>
  </div>
  <div class="header-actions">
    <div class="lang-legend" id="lang-legend"></div>
    <button class="btn-icon" onclick="newSeed()" title="Nova cidade aleatória">🎲</button>
    <a href="/" class="btn-icon">← Voltar</a>
  </div>
</header>

<div class="loading-screen" id="loading">
  <div class="loading-inner">
    <div class="loading-anim" id="loading-anim"></div>
    <p class="loading-text" id="loading-text">Buscando repositórios...</p>
    <p class="loading-sub" id="loading-sub"></p>
  </div>
</div>

<div class="error-screen" id="error-screen" style="display:none">
  <div class="error-inner">
    <div class="error-icon">⚠️</div>
    <p class="error-msg" id="error-text"></p>
    <a href="/" class="btn-primary">Voltar</a>
  </div>
</div>

<div class="city-viewport" id="city-viewport" style="display:none">
  <div class="control-hint" id="control-hint">
    <div class="hint-card">
      <div class="hint-icon">🖱️</div>
      <p class="hint-title">Clique para explorar a cidade</p>
      <div class="hint-keys">
        <div class="key-row"><kbd>W A S D</kbd> mover</div>
        <div class="key-row"><kbd>Mouse</kbd> olhar</div>
        <div class="key-row"><kbd>E / Q</kbd> subir / descer</div>
        <div class="key-row"><kbd>Shift</kbd> correr</div>
        <div class="key-row"><kbd>Esc</kbd> sair</div>
      </div>
    </div>
  </div>
</div>

<script>
  const USERNAME = {{ ('"' + username + '"') | safe if username else 'null' }};
  const SEED     = {{ seed if seed else 'null' }};
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/assets/js/render.js"></script>
</body>
</html>
